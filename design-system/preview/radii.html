<!doctype html>
<html><head><meta charset="utf-8"><title>Radii — Asymmetric</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-bg-deep);color:var(--fg1);font-family:var(--font-body);height:100%}
  .wrap{padding:18px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .c{background:var(--color-bg-surface);border:1px solid var(--border);padding:14px;min-height:74px;display:flex;flex-direction:column;justify-content:space-between}
  .lbl{font-family:var(--font-heading);font-weight:900;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--fg1)}
  .tok{font-family:var(--font-mono);font-size:10px;color:var(--fg3)}
</style></head>
<body><div class="wrap">
  <div class="c" style="border-radius:24px 8px 24px 4px"><div class="lbl">organic-lg</div><div class="tok">24px 8px 24px 4px</div></div>
  <div class="c" style="border-radius:16px 6px 16px 3px"><div class="lbl">organic-md</div><div class="tok">16 6 16 3</div></div>
  <div class="c" style="border-radius:12px 4px 12px 2px"><div class="lbl">organic-sm</div><div class="tok">12 4 12 2</div></div>
  <div class="c" style="border-radius:4px 24px 4px 24px"><div class="lbl">organic-inv</div><div class="tok">4 24 4 24</div></div>
  <div class="c" style="border-radius:3px 16px 3px 16px"><div class="lbl">organic-inv-md</div><div class="tok">3 16 3 16</div></div>
  <div class="c" style="border-radius:24px 6px 6px 24px"><div class="lbl">pill-left</div><div class="tok">24 6 6 24</div></div>
  <div class="c" style="border-radius:6px 24px 24px 6px"><div class="lbl">pill-right</div><div class="tok">6 24 24 6</div></div>
  <div class="c" style="border-radius:4px 4px 20px 20px"><div class="lbl">scoop</div><div class="tok">4 4 20 20</div></div>
</div></body></html>
