<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#000;color:var(--fg1);font-family:var(--font-body);height:100%}
  .wrap{padding:20px;display:grid;gap:10px}
  .row{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .sw{border-radius:var(--radius-organic-inv-md);overflow:hidden;border:1px solid var(--border)}
  .sw .chip{height:72px}
  .sw .meta{padding:8px 10px;background:var(--color-bg-surface)}
  .sw .name{font-family:var(--font-mono);font-size:10px;color:var(--fg2)}
  .sw .hex{font-family:var(--font-mono);font-size:10.5px;color:var(--fg1);margin-top:2px}
  .ttl{font-family:var(--font-heading);font-weight:900;font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3)}
</style></head>
<body><div class="wrap">
  <div class="ttl">Surfaces · 7-stop elevation</div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#060910"></div><div class="meta"><div class="name">abyss</div><div class="hex">#060910</div></div></div>
    <div class="sw"><div class="chip" style="background:#0A0E14"></div><div class="meta"><div class="name">deep</div><div class="hex">#0A0E14</div></div></div>
    <div class="sw"><div class="chip" style="background:#111820"></div><div class="meta"><div class="name">surface</div><div class="hex">#111820</div></div></div>
    <div class="sw"><div class="chip" style="background:#151D28"></div><div class="meta"><div class="name">raised</div><div class="hex">#151D28</div></div></div>
    <div class="sw"><div class="chip" style="background:#1A2230"></div><div class="meta"><div class="name">elevated</div><div class="hex">#1A2230</div></div></div>
    <div class="sw"><div class="chip" style="background:#1F2A3A"></div><div class="meta"><div class="name">shelf</div><div class="hex">#1F2A3A</div></div></div>
    <div class="sw"><div class="chip" style="background:#253244"></div><div class="meta"><div class="name">float</div><div class="hex">#253244</div></div></div>
  </div>
</div></body></html>
