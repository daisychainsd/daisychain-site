<!doctype html>
<html><head><meta charset="utf-8"><title>Footer</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#060910;color:var(--fg1);font-family:var(--font-body);height:100%}
  .glow{height:1px;background:linear-gradient(90deg,transparent,rgba(124,185,232,.3),transparent)}
  .foot{padding:28px;box-sizing:border-box}
  .card{border-radius:var(--radius-organic-lg);background:var(--color-bg-surface);border:1px solid var(--border);padding:22px}
  .row{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px}
  .brand img{width:20px;height:20px;opacity:.5}
  .name{font-family:var(--font-heading);font-weight:900;letter-spacing:-.01em;font-size:16px}
  .tag{color:var(--fg2);font-size:13px;margin-top:6px;max-width:280px;line-height:1.45}
  .links{display:flex;gap:10px;flex-wrap:wrap}
  .link{padding:8px 14px;border-radius:24px 6px 6px 24px;color:var(--fg2);font-size:13px;text-decoration:none;transition:all .2s}
  .link:hover{color:var(--color-blue-300);background:rgba(124,185,232,.05)}
  .cop{color:var(--fg3);font-size:12px;margin-top:18px}
</style></head>
<body>
  <div class="glow"></div>
  <div class="foot">
    <div class="card">
      <div class="row">
        <div>
          <div class="brand"><img src="../assets/flower-white.png" alt=""><span class="name">DAISY CHAIN</span></div>
          <div class="tag">A record label and intimate dance floor based in San Diego.</div>
        </div>
        <div class="links">
          <a class="link">Instagram</a><a class="link">YouTube</a><a class="link">Bandcamp</a><a class="link">SoundCloud</a>
        </div>
      </div>
      <div class="glow" style="margin:18px 0 10px"></div>
      <div class="cop">© 2026 Daisy Chain Productions LLC. San Diego, CA.</div>
    </div>
  </div>
</body></html>
