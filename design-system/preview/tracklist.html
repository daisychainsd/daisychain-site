<!doctype html>
<html><head><meta charset="utf-8"><title>Tracklist + Global Player</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-bg-deep);color:var(--fg1);font-family:var(--font-body)}
  /* The preview itself models a slice of browser viewport so the
     user can see where the player lives in-page. */
  .frame{
    position:relative;
    min-height:100vh;
    padding:18px 18px 0;
    box-sizing:border-box;
    /* faint page-bg so the sticky player feels grounded */
    background:
      radial-gradient(ellipse 60% 40% at 100% 0%, rgba(124,185,232,.04), transparent 70%),
      var(--color-bg-deep);
  }
  .caption{
    font-family:var(--font-mono);font-size:10px;color:var(--fg3);
    letter-spacing:.04em;text-transform:uppercase;margin:0 0 10px;
    display:flex;align-items:center;gap:8px;
  }
  .caption::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--color-blue-300)}

  .list{border-radius:4px 4px 20px 20px;background:var(--color-bg-surface);border:1px solid var(--border);overflow:hidden}
  .row{display:flex;align-items:center;gap:16px;padding:12px 16px;border-bottom:1px solid rgba(124,185,232,.05);border-left:2px solid transparent;transition:background .2s}
  .row:last-child{border-bottom:none}
  .row.active{background:rgba(124,185,232,.05);border-left-color:var(--color-blue-300)}
  .play{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--fg2);flex:none;background:transparent;border:none;cursor:pointer}
  .play.hot{color:var(--color-blue-300)}
  .body{flex:1;min-width:0}
  .tt{font-size:15px;color:var(--fg1);font-weight:500}
  .tt.hot{color:var(--color-blue-300)}
  .ar{font-size:13px;color:var(--fg2)}
  .dur{color:var(--fg3);font-family:var(--font-label);font-size:13px}
  .wf{flex:1;min-width:0;height:32px;display:flex;align-items:center;gap:1.5px}
  .bar{width:2px;border-radius:1px;background:#1F2A3A}
  .bar.on{background:var(--color-blue-300)}
  .active .body{display:flex;align-items:center;gap:12px}
  .active .body .meta{max-width:45%;min-width:0}

  /* spacer so sticky player doesn't overlap content */
  .spacer{height:96px}

  /* --- Sticky global player (docked to viewport bottom) --- */
  .player{
    position:fixed;left:16px;right:16px;bottom:14px;z-index:50;
    display:flex;align-items:center;gap:16px;
    padding:10px 14px;
    background:rgba(17,24,32,.88);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--border-strong);
    border-radius:999px;
    box-shadow:
      0 10px 40px rgba(0,0,0,.45),
      0 2px 12px rgba(124,185,232,.08);
  }
  .player .pbtn{
    width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    background:var(--color-blue-300);color:var(--color-bg-deep);flex:none;
  }
  .player .meta{display:flex;flex-direction:column;min-width:0;max-width:240px;gap:2px}
  .player .meta .t{font-size:13px;color:var(--fg1);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .player .meta .a{font-size:11px;color:var(--fg2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .player .progress{flex:1;min-width:0;display:flex;align-items:center;gap:8px}
  .player .time{font-family:var(--font-mono);font-size:10px;color:var(--fg3);flex:none}
  .player .track{flex:1;min-width:0;height:3px;border-radius:999px;background:#1F2A3A;position:relative;overflow:hidden}
  .player .track::after{content:"";position:absolute;inset:0 62% 0 0;background:var(--color-blue-300);border-radius:999px}

  .vu{display:flex;gap:3px;align-items:flex-end;height:22px;padding:2px 6px;
      background:var(--color-bg-deep);border-radius:4px;border:1px solid var(--border);flex:none}
  .vu .ch{display:flex;flex-direction:column;gap:1px;justify-content:flex-end;height:18px}
  .vu .seg{width:11px;height:2px;border-radius:1px;background:#1F2A3A;transition:background-color .08s linear}
  .vu .seg.lit.lo{background:var(--color-blue-500)}
  .vu .seg.lit.mi{background:var(--color-blue-300)}
  .vu .seg.lit.hi{background:var(--color-red-300)}
  .vu-lbl{font-family:var(--font-mono);font-size:9px;color:var(--fg4);display:flex;flex-direction:column;gap:4px;line-height:1;flex:none}

  .vol{display:flex;align-items:center;gap:8px;flex:none}
  .vol svg{color:var(--fg2);flex:none}
  .slider{
    -webkit-appearance:none;appearance:none;
    width:90px;height:4px;border-radius:999px;
    background:linear-gradient(to right, var(--color-blue-300) 0% 72%, #1F2A3A 72% 100%);
    outline:none;cursor:pointer;
  }
  .slider::-webkit-slider-thumb{
    -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
    background:var(--color-offwhite);border:2px solid var(--color-blue-300);cursor:grab;
  }

  .annotation{
    position:absolute;right:24px;bottom:70px;
    font-family:var(--font-mono);font-size:10px;color:var(--fg3);
    display:flex;align-items:center;gap:6px;pointer-events:none;
  }
  .annotation::after{content:"";width:24px;border-top:1px dashed var(--fg4);transform:translateY(10px)}
</style></head>
<body>

<div class="frame">
  <p class="caption">Release Page · in-flow tracklist</p>

  <div class="list">
    <div class="row active">
      <button class="play hot"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="2" width="4" height="12" rx="1"/><rect x="9" y="2" width="4" height="12" rx="1"/></svg></button>
      <div class="body"><div class="meta"><div class="tt hot">Heartbeat</div><div class="ar">Player Dave &amp; Elohim</div></div>
        <div class="wf" id="wf"></div>
      </div>
      <div class="dur">4:12</div>
    </div>
    <div class="row">
      <button class="play"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2l10 6-10 6V2z"/></svg></button>
      <div class="body"><div class="tt">v@por</div><div class="ar">Player Dave</div></div>
      <div class="dur">3:48</div>
    </div>
    <div class="row">
      <button class="play"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2l10 6-10 6V2z"/></svg></button>
      <div class="body"><div class="tt">Microjoy (feat. Allegra Miles)</div><div class="ar">Player Dave &amp; Canary Yellow</div></div>
      <div class="dur">3:55</div>
    </div>
  </div>

  <div class="spacer"></div>

  <!-- Annotation pointing at the sticky player -->
  <div class="annotation">Sticky · floats on viewport bottom</div>

  <!-- Global, sticky player: appears only once playback starts -->
  <div class="player" role="region" aria-label="Now playing">
    <button class="pbtn"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="2" width="4" height="12" rx="1"/><rect x="9" y="2" width="4" height="12" rx="1"/></svg></button>

    <div class="meta">
      <div class="t">Heartbeat</div>
      <div class="a">Player Dave &amp; Elohim · DCR#19</div>
    </div>

    <div class="progress">
      <span class="time">1:34</span>
      <div class="track"></div>
      <span class="time">4:12</span>
    </div>

    <div class="vu-lbl"><span>L</span><span>R</span></div>
    <div class="vu">
      <div class="ch" id="vuL"></div>
      <div class="ch" id="vuR"></div>
    </div>

    <div class="vol">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 6v4h3l4 3V3L5 6H2z" fill="currentColor" stroke="none"/>
        <path d="M11 5.5c.9.7 1.5 1.8 1.5 2.9s-.6 2.2-1.5 2.9"/>
        <path d="M13 3.5c1.7 1.1 2.7 3 2.7 5s-1 3.9-2.7 5"/>
      </svg>
      <input type="range" min="0" max="100" value="72" class="slider" id="vol">
    </div>
  </div>
</div>

<script>
  const wf=document.getElementById('wf');
  const heights=[4,6,8,11,14,18,22,20,16,12,10,14,20,26,30,24,18,14,10,12,16,22,28,26,20,16,14,18,22,26,22,18,14,10,14,18,22,20,16,12,8,6,10,14,18,14,10,8,6,4,3,2];
  for(let i=0;i<heights.length;i++){const b=document.createElement('div');b.className='bar'+(i<22?' on':'');b.style.height=heights[i]+'px';wf.appendChild(b);}

  const SEGS=9;
  function buildCh(el){for(let i=0;i<SEGS;i++){const s=document.createElement('div');s.className='seg';el.appendChild(s);}}
  const L=document.getElementById('vuL'), R=document.getElementById('vuR');
  buildCh(L); buildCh(R);
  function cls(i){return i<5?'lo':i<8?'mi':'hi';}
  function lvl(){return 4+Math.floor(Math.random()*6);}
  function tick(){[[L,lvl()],[R,lvl()]].forEach(([ch,v])=>{
    [...ch.children].reverse().forEach((seg,i)=>{ seg.className='seg'+(i<v?(' lit '+cls(i)):''); });
  });}
  tick(); setInterval(tick,110);

  const vol=document.getElementById('vol');
  vol.addEventListener('input',()=>{
    const v=vol.value;
    vol.style.background=`linear-gradient(to right, var(--color-blue-300) 0% ${v}%, #1F2A3A ${v}% 100%)`;
  });
</script>
</body></html>
