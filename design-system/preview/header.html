<!doctype html>
<html><head><meta charset="utf-8"><title>Header</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-bg-deep);color:var(--fg1);font-family:var(--font-body);height:100%}
  header{border-bottom:1px solid var(--border);background:var(--color-bg-deep);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
  .logo{display:flex;align-items:center;gap:10px}
  .logo img{width:32px;height:32px}
  nav{display:flex;gap:4px}
  nav a{padding:8px 14px;border-radius:8px;color:var(--fg2);font-size:14px;text-decoration:none;transition:all .2s}
  nav a:hover,nav a.cur{color:var(--color-blue-300);background:rgba(124,185,232,.06)}
  .cart{display:flex;align-items:center;justify-content:center;width:36px;height:36px;position:relative;color:var(--fg2)}
  .badge{position:absolute;top:-2px;right:-2px;width:16px;height:16px;border-radius:50%;background:var(--color-blue-300);color:#0A0E14;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono)}
  .pad{padding:40px 24px;text-align:center;color:var(--fg3);font-size:12px;font-family:var(--font-mono)}
</style></head>
<body>
  <header>
    <div class="logo"><img src="../assets/flower-white.png" alt=""></div>
    <nav>
      <a class="cur">Music</a><a>Artists</a><a>Shop</a><a>Events</a><a>Account</a>
    </nav>
    <div class="cart">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2l2 4h8l2-4M4 6h16l-1.5 12H5.5L4 6zM9 10v6M15 10v6"/></svg>
      <div class="badge">2</div>
    </div>
  </header>
  <div class="pad">fixed top · border-b 6% · flower at 32×32 · hover tint blue-300 /6</div>
</body></html>
