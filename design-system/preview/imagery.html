<!doctype html>
<html><head><meta charset="utf-8"><title>Hero Imagery</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-bg-deep);color:var(--fg1);font-family:var(--font-body);height:100%;overflow:hidden}
  .wrap{position:relative;height:100%;display:grid;grid-template-columns:1.4fr 1fr;gap:0}
  .img{position:relative;overflow:hidden}
  .img img{width:100%;height:100%;object-fit:cover;display:block}
  .img::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(10,14,20,.6),transparent 60%,rgba(10,14,20,.2))}
  .lbl{position:absolute;bottom:10px;left:12px;font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,.75);z-index:2;text-shadow:0 1px 3px rgba(0,0,0,.6)}
</style></head>
<body><div class="wrap">
  <div class="img"><img src="../assets/hero.png" alt=""><div class="lbl">hero · B&amp;W · grain · stadium-font</div></div>
  <div class="img"><img src="../assets/bg-dc28-landscape.webp" alt=""><div class="lbl">site-bg · chrome-liquid · 10% opacity fixed</div></div>
</div></body></html>
