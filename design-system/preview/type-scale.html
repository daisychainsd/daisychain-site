<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-bg-deep);color:var(--fg1);font-family:var(--font-body);height:100%;overflow:hidden}
  .wrap{padding:22px;display:grid;gap:10px}
  .row{display:grid;grid-template-columns:1fr auto;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid var(--border)}
  .tok{font-family:var(--font-mono);font-size:10.5px;color:var(--fg3);white-space:nowrap}
</style></head>
<body><div class="wrap">
  <div class="row"><div style="font-family:var(--font-heading);font-weight:900;font-size:72px;line-height:.9;letter-spacing:-.03em;text-transform:uppercase">DAISY</div><div class="tok">--text-display · 900</div></div>
  <div class="row"><div style="font-family:var(--font-heading);font-weight:900;font-size:44px;line-height:1.05;letter-spacing:-.02em;text-transform:uppercase">Heartbeat EP</div><div class="tok">--text-headline</div></div>
  <div class="row"><div style="font-family:var(--font-heading);font-weight:900;font-size:22px;line-height:1.2">Release Title</div><div class="tok">--text-title</div></div>
  <div class="row"><div style="font-family:var(--font-body);font-size:16px">Independent electronic music label based in San Diego.</div><div class="tok">--text-body · 16</div></div>
  <div class="row"><div style="font-family:var(--font-body);font-size:15px;color:var(--fg2)">Secondary captions sit at this size.</div><div class="tok">--text-caption · 15</div></div>
  <div class="row"><div style="font-family:var(--font-label);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg3);font-weight:700">UPCOMING · LINEUP · SOON</div><div class="tok">label</div></div>
</div></body></html>
