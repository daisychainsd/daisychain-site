<!doctype html>
<html><head><meta charset="utf-8"><title>Icons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-bg-deep);color:var(--fg1);font-family:var(--font-body);height:100%}
  .wrap{padding:22px;display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
  .c{background:var(--color-bg-surface);border:1px solid var(--border);border-radius:var(--radius-organic-md);padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--fg1)}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg3)}
</style></head>
<body><div class="wrap">
  <div class="c"><svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2l10 6-10 6V2z"/></svg><div class="lbl">play</div></div>
  <div class="c"><svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="2" width="4" height="12" rx="1"/><rect x="9" y="2" width="4" height="12" rx="1"/></svg><div class="lbl">pause</div></div>
  <div class="c"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10m0 0l-4-4m4 4l-4 4"/></svg><div class="lbl">arrow</div></div>
  <div class="c"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="color:#f56e6e"><path d="M23.5 6.2a3 3 0 00-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.5A3 3 0 00.5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 002.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 002.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.5 15.6V8.4L15.8 12l-6.3 3.6z"/></svg><div class="lbl">youtube</div></div>
  <div class="c"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2l2 4h8l2-4M4 6h16l-1.5 12H5.5L4 6z"/></svg><div class="lbl">cart</div></div>
  <div class="c"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg><div class="lbl">menu</div></div>
</div></body></html>
