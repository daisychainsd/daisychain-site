<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Blue</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-bg-deep);color:var(--fg1);font-family:var(--font-body);height:100%}
  .wrap{padding:20px;display:grid;gap:12px}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{border-radius:var(--radius-organic-inv-md);overflow:hidden;border:1px solid var(--border);aspect-ratio:1.2}
  .sw .chip{height:56px}
  .sw .meta{padding:8px 10px;background:var(--color-bg-surface)}
  .sw .name{font-family:var(--font-mono);font-size:10px;color:var(--fg2);letter-spacing:.04em}
  .sw .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg1);margin-top:2px}
  .ttl{font-family:var(--font-heading);font-weight:900;font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3)}
</style></head>
<body><div class="wrap">
  <div class="ttl">Blue · flower-mark accent</div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#D4EAFF"></div><div class="meta"><div class="name">blue-100</div><div class="hex">#D4EAFF</div></div></div>
    <div class="sw"><div class="chip" style="background:#B0D4F1"></div><div class="meta"><div class="name">blue-200</div><div class="hex">#B0D4F1</div></div></div>
    <div class="sw" style="outline:2px solid var(--color-blue-300);outline-offset:-2px"><div class="chip" style="background:#7CB9E8"></div><div class="meta"><div class="name">blue-300 ●</div><div class="hex">#7CB9E8</div></div></div>
    <div class="sw"><div class="chip" style="background:#5AA3DC"></div><div class="meta"><div class="name">blue-400</div><div class="hex">#5AA3DC</div></div></div>
    <div class="sw"><div class="chip" style="background:#3A8CCF"></div><div class="meta"><div class="name">blue-500</div><div class="hex">#3A8CCF</div></div></div>
    <div class="sw"><div class="chip" style="background:#2670A8"></div><div class="meta"><div class="name">blue-600</div><div class="hex">#2670A8</div></div></div>
  </div>
</div></body></html>
